<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Manifesting Me</title>
  <meta name="description" content="A personal manifestation manual and life dashboard." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#F4EFE6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Manifesting Me" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />

  <!-- Fonts: serif headings (Cormorant Garamond), sans body (Jost) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== PASSWORD GATE ===== -->
  <div class="gate" id="gate">
    <div class="gate-mark">Manifesting Me</div>
    <div class="gate-tag">She is already her</div>
    <form id="gate-form" autocomplete="off">
      <input type="password" id="gate-input" placeholder="Password" aria-label="Password" />
      <div class="gate-err" id="gate-err"></div>
      <button type="submit" class="btn">Enter</button>
    </form>
  </div>

  <!-- ===== APP ===== -->
  <div class="app">
    <header class="masthead no-print">
      <div class="wordmark">Manifesting Me</div>
      <div class="tagline">She is already her. This confirms it.</div>
    </header>

    <main>
      <section class="view" id="view-brief"></section>
      <section class="view" id="view-health"></section>
      <section class="view" id="view-abundance"></section>
      <section class="view" id="view-spirituality"></section>
      <section class="view" id="view-business"></section>
      <section class="view" id="view-love"></section>
      <section class="view" id="view-home"></section>
    </main>
  </div>

  <!-- ===== BOTTOM TAB BAR ===== -->
  <nav class="tabbar no-print">
    <button class="tab" data-section="brief">
      <svg viewBox="0 0 24 24"><path d="M4 19V5a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v14M4 19h16M4 19l4-5 3 3 4-6 5 8"/></svg>
      <span class="tab-label">Brief</span>
    </button>
    <button class="tab" data-section="health">
      <svg viewBox="0 0 24 24"><path d="M20 8.5C20 5.5 17.8 4 15.7 4 14 4 12.6 5 12 6c-.6-1-2-2-3.7-2C6.2 4 4 5.5 4 8.5c0 4.5 8 11 8 11s8-6.5 8-11Z"/></svg>
      <span class="tab-label">Health</span>
    </button>
    <button class="tab" data-section="abundance">
      <svg viewBox="0 0 24 24"><path d="M12 3v18M8 6h6a3 3 0 0 1 0 6H9a3 3 0 0 0 0 6h7"/></svg>
      <span class="tab-label">Abundance</span>
    </button>
    <button class="tab" data-section="spirituality">
      <svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0 0 14 5 5 0 0 1 0 6 10 10 0 0 0 0-20Z"/><circle cx="17" cy="6" r="1"/></svg>
      <span class="tab-label">Spirit</span>
    </button>
    <button class="tab" data-section="business">
      <svg viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="13" rx="1"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      <span class="tab-label">Business</span>
    </button>
    <button class="tab" data-section="love">
      <svg viewBox="0 0 24 24"><path d="M12 20s-7-4.6-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 10c0 5.4-7 10-7 10Z"/></svg>
      <span class="tab-label">Love</span>
    </button>
    <button class="tab" data-section="home">
      <svg viewBox="0 0 24 24"><path d="M4 11l8-7 8 7M6 9.5V20h12V9.5"/></svg>
      <span class="tab-label">Home</span>
    </button>
  </nav>

  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/gate.js"></script>
  <script src="js/brief.js"></script>
  <script src="js/abundance.js"></script>
  <script src="js/spirituality.js"></script>
  <script src="js/love.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
